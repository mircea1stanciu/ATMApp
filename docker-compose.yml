version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: unifiedwork_postgres
    environment:
      POSTGRES_USER: unifiedwork
      POSTGRES_PASSWORD: password
      POSTGRES_DB: unifiedwork
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unifiedwork_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unifiedwork"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: unifiedwork_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - unifiedwork_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unifiedwork_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://unifiedwork:password@postgres:5432/unifiedwork
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - unifiedwork_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unifiedwork_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - unifiedwork_network
    command: npm run dev

networks:
  unifiedwork_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
